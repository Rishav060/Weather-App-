<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" /> 
  <script src="script.js" defer></script>
</head>
<body>
  <main class="main-container">
    <header class="input-container">
      <input type="text" class="city-input" placeholder="Search City">
      <button class="search-btn">
           <span class="material-symbols-outlined">
              search
           </span>
      </button>
    </header>
    <section class="weather-info" style="display: none;">
      <div class="location-date-container">
        <div class="location">
          <span class="material-symbols-outlined">
              location_on
          </span>
          <h4 class="country-txt">London</h4>
        </div>
        <h5 class="current-date-txt regular-txt">Wed 06 Feb</h5>
      </div>
      <div class="weather-summary-container">
        <img src="Assets/sunny.png" class="weather-summary-img">  
        <div class="weather-summary-info">
          <h1 class="temp-txt">29 ℃</h1>
          <h3 class="condition-txt regular-txt">Clouds</h3>
        </div>
      </div>
      <div class="weather-condition-container">
        <div class="condition-items">
          <span class="material-symbols-outlined">
               water_drop
          </span>
          <div class="condition-info">
            <h5 class="regular-txt">Humidity</h5>
            <h5 class="humidity-value-txt">55%</h5>
          </div>
        </div>

        <div class="condition-items">
          <span class="material-symbols-outlined">
              air
          </span>
          <div class="condition-info">
            <h5 class="regular-txt">Wind-Speed</h5>
            <h5 class="wind-value-txt">8M/s</h5>
          </div>
        </div>

      </div>
      
      <div class="forecast-items-container">
        <div class="forecast-items"> 
          <h5 class="forecast-item-date regular-txt">06 Feb</h5>
          <img class="forecast-item-img" src="Assets/thunderstorm.png">
          <h5 class="forecast-item-temp">29 ℃</h5>
        </div>
        <div class="forecast-items"> 
          <h5 class="forecast-item-date regular-txt">06 Feb</h5>
          <img class="forecast-item-img" src="Assets/thunderstorm.png">
          <h5 class="forecast-item-temp">29 ℃</h5>
        </div>
        <div class="forecast-items"> 
          <h5 class="forecast-item-date regular-txt">06 Feb</h5>
          <img class="forecast-item-img" src="Assets/thunderstorm.png">
          <h5 class="forecast-item-temp">29 ℃</h5>
        </div>
        <div class="forecast-items"> 
          <h5 class="forecast-item-date regular-txt">06 Feb</h5>
          <img class="forecast-item-img" src="Assets/thunderstorm.png">
          <h5 class="forecast-item-temp">29 ℃</h5>
        </div>
      </div>

    </section>

    <section class="srch-city section-msg">
      <img src="Assets/city-location-5879245-4932251-removebg-preview.png">
      <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">Find out the weather conditions of the city</h4>
      </div>
    </section> 

    <section class="not-found section-msg" style="display: none;">
      <img src="Assets/404_error-removebg-preview.png">
      <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">Find out the weather conditions of the city</h4>
      </div>
    </section>
  </main>
</body>
</html>
